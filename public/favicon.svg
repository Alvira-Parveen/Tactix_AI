<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rounded dark green/slate pitch background -->
  <rect width="32" height="32" rx="8" fill="#18181b"/>
  <!-- Field lines (semi-transparent green/cream) -->
  <rect x="2" y="2" width="28" height="28" rx="6" fill="none" stroke="#27272a" stroke-width="1.5"/>
  <line x1="2" y1="16" x2="30" y2="16" stroke="#27272a" stroke-width="1.5"/>
  <circle cx="16" cy="16" r="4" fill="none" stroke="#27272a" stroke-width="1.5"/>
  <!-- Center spot -->
  <circle cx="16" cy="16" r="1" fill="#22d3ee"/>
  <!-- Tactical Xs and Os (cyan and purple) -->
  <!-- X (Attackers) -->
  <path d="M 12 10 L 16 14 M 16 10 L 12 14" stroke="#22d3ee" stroke-width="2" stroke-linecap="round"/>
  <!-- O (Defenders) -->
  <circle cx="20" cy="22" r="2" fill="none" stroke="#a78bfa" stroke-width="2"/>
</svg>
